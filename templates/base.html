<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}银龄守护 - 街道管理后台{% endblock %}</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- 自定义样式 -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h5><i class="fas fa-shield-heart"></i> 银龄守护</h5>
            <small>街道管理后台</small>
        </div>
        <nav class="sidebar-nav">
            <a href="{{ url_for('dashboard.dashboard_page') }}" class="nav-link {% if request.endpoint == 'dashboard.dashboard_page' %}active{% endif %}">
                <i class="fas fa-chart-pie"></i> <span>仪表盘</span>
            </a>
            <a href="{{ url_for('alerts.alerts_list') }}" class="nav-link {% if request.endpoint and request.endpoint.startswith('alerts.') %}active{% endif %}">
                <i class="fas fa-bell"></i> <span>告警管理</span>
            </a>
            <a href="{{ url_for('elderly.elderly_list') }}" class="nav-link {% if request.endpoint and request.endpoint.startswith('elderly.') %}active{% endif %}">
                <i class="fas fa-user-group"></i> <span>老人管理</span>
            </a>
            <a href="{{ url_for('services.services_list') }}" class="nav-link {% if request.endpoint and request.endpoint.startswith('services.') %}active{% endif %}">
                <i class="fas fa-handshake-angle"></i> <span>服务管理</span>
            </a>
            <a href="{{ url_for('staff.staff_list') }}" class="nav-link {% if request.endpoint and request.endpoint.startswith('staff.') %}active{% endif %}">
                <i class="fas fa-user-gear"></i> <span>人员管理</span>
            </a>
        </nav>
    </aside>

    <!-- 主内容区 -->
    <div class="main-content" id="mainContent">
        <!-- 顶部导航栏 -->
        <header class="top-bar">
            <button class="btn btn-link sidebar-toggle d-md-none" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <div class="page-title">
                {% block page_title %}银龄守护 · 街道管理后台{% endblock %}
            </div>
            <div class="user-info">
                <span><i class="fas fa-user-circle"></i> 街道管理员</span>
            </div>
        </header>

        <!-- 页面内容 -->
        <div class="content-area">
            {% block content %}{% endblock %}
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('show');
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
